  const handleOpt=(opt,msgId)=>{setMsgs(p=>p.map(m=>m.id===msgId?{...m,used:true}:m));const v=opt.val;if(v.startsWith("showmore:")){const shown=parseInt(v.replace("showmore:",""));const all=ctx.lastResults||[];const nextShown=Math.min(shown+5,all.length);const hasMore=nextShown<all.length;setMsgs(p=>p.map(m=>m.id===msgId?{...m,used:false,opts:hasMore?[{label:`Show more (${all.length-nextShown} more) →`,val:`showmore:${nextShown}`}]:null,comp:{...m.comp,vehicles:all.slice(0,nextShown),shown:nextShown,total:all.length}}:m));return;}if(v==="restart"){reset();return;}if(v.startsWith("day:")){const dayLabel=v.replace("day:","");const dayData=allDays.find(d=>d.date===dayLabel);if(!dayData||!dayData.slots.length){addBot("No slots available that day. Please pick another day.");return;}setSelectedDay(dayData);addUser(`📅 ${dayLabel}`);const timeOpts=dayData.slots.map(s=>({label:s.time,val:`time:${s.start}|${s.end}|${dayLabel}|${s.time}`}));addBot(`Here are the available times on ${dayLabel}:`,timeOpts);return;}if(v.startsWith("moredays:")){const current=parseInt(v.replace("moredays:",""));const newCount=current+5;setVisibleDayCount(newCount);showDayPicker(allDays,newCount);return;}if(v.startsWith("time:")){const parts=v.replace("time:","").split("|");const[startISO,endISO,dateLabel,timeLabel]=parts;addUser(`${timeLabel}`);pickSlot({startISO,endISO,date:dateLabel,time:timeLabel});return;}if(v==="cash"||v==="finance"||v==="trade-in"){addUser(v==="cash"?"💵 Cash":v==="finance"?"🏦 Finance":"🔄 Trade-in");handleIntent(v);return;}if(v==="paid"){addUser("Fully paid off");setCtx(p=>({...p,tradeIn:{...p.tradeIn,paidOff:true,amountOwed:"$0"}}));askTradeHow();return;}if(v==="owed"){addUser("Still making payments");addBot("How much do you still owe?");setStage(S.TI_OWED);return;}if(v==="ti_cash"){addUser("Pay difference in cash");setCtx(p=>({...p,intent:"trade-in + cash"}));addBot("Love it! Our finance department will sort out your trade-in and get everything set up. It was so great chatti If they do not want to give info:

Never make the customer feel pressured when leaving. Keep it light, warm, and genuine. The goal is to leave such a good impression that they come back or answer when the team calls.

ESCALATE:
If a customer asks about price negotiation, monthly payments, trade-in value, or wants to speak to a real person end your message with ESCALATE.
If a customer seems frustrated or mentions another dealership and is not convinced end your message with ESCALATE.
